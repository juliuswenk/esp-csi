name: Deploy portfolio site to GitHub Pages

on:
  push:
    branches:
      - master
    paths:
      - "portfolio-site/**"
      - "Dokumentation/**/*.JPG"
      - "Dokumentation/**/*.jpg"
      - "Dokumentation/**/*.JPEG"
      - "Dokumentation/**/*.jpeg"
      - "Dokumentation/**/*.PNG"
      - "Dokumentation/**/*.png"
      - "project-description.md"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Prepare static site
        run: |
          mkdir -p _site
          cp -R portfolio-site/. _site/
          cp project-description.md _site/project-description.md
          mkdir -p "_site/Dokumentation/finished installation"
          mkdir -p "_site/Dokumentation/Work in Progress/building the installation"
          find "Dokumentation/finished installation" -maxdepth 1 -type f \( -iname "*.jpg" -o -iname "*.jpeg" -o -iname "*.png" \) -exec cp {} "_site/Dokumentation/finished installation/" \;
          find "Dokumentation/Work in Progress/building the installation" -maxdepth 1 -type f \( -iname "*.jpg" -o -iname "*.jpeg" -o -iname "*.png" \) -exec cp {} "_site/Dokumentation/Work in Progress/building the installation/" \;

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
